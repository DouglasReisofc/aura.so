name: Build And Release Aura SO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Stamp Patch Version
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          python3 - <<'PY'
          import os
          import json
          p = "app/src/main/cpp/config.json"
          with open(p, "r", encoding="utf-8") as f:
              data = json.load(f)
          data["patchVersion"] = int(os.environ["RUN_NUMBER"])
          with open(p, "w", encoding="utf-8") as f:
              json.dump(data, f, indent=2)
          print("config.patchVersion =", data["patchVersion"])
          PY

      - name: Build Debug
        run: ./gradlew assembleDebug

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aura-debug-${{ github.run_number }}
          path: |
            app/build/intermediates/stripped_native_libs/debug/stripDebugDebugSymbols/out/lib/arm64-v8a/libaura.so
            app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: aura-${{ github.run_number }}
          name: Aura Build ${{ github.run_number }}
          make_latest: true
          files: |
            app/build/intermediates/stripped_native_libs/debug/stripDebugDebugSymbols/out/lib/arm64-v8a/libaura.so
            app/build/outputs/apk/debug/app-debug.apk
